<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>🧩 機構積木</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; color: #2c3e50;
      display: flex; flex-direction: column; height: 100vh;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); z-index: 5;
    }
    header h1 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .home-btn { text-decoration: none; color: #34495e; background: #eef2f7; padding: 8px 14px;
      border-radius: 20px; font-size: 14px; font-weight: 600; }
    .stage { flex: 1; display: flex; min-height: 0; }

    /* 零件盤 */
    .tray { width: 150px; background: #fff; border-right: 1px solid #eee; padding: 14px 10px;
      display: flex; flex-direction: column; gap: 12px; }
    .tray-title { font-size: 12px; color: #95a5a6; font-weight: 700; letter-spacing: 0.05em; }
    .block {
      border: 2px solid #e6e9f0; border-radius: 14px; padding: 12px 8px; cursor: pointer;
      background: #fff; text-align: center; transition: transform .08s, box-shadow .12s;
      display: flex; flex-direction: column; align-items: center; gap: 6px; user-select: none;
    }
    .block:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,0.08); }
    .block:active { transform: translateY(0); }
    .block .ico { font-size: 30px; line-height: 1; }
    .block .name { font-size: 13px; font-weight: 700; }
    .block .role { font-size: 10px; color: #95a5a6; }
    .block.motor { border-color: #f7c5c0; }
    .block.anchor { border-color: #d8dee6; }
    .block.link { border-color: #bcd3f0; }

    /* 畫布 */
    .canvas-wrap { flex: 1; position: relative; min-width: 0; }
    #stageSvg { width: 100%; height: 100%; display: block; background:
      linear-gradient(#f6f8fb 0 0); }
    .hint {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #b0bac6; font-size: 16px; text-align: center; pointer-events: none; line-height: 1.7;
    }
    .mode-banner {
      position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(44,62,80,0.94); color: #fff; border-radius: 999px;
      padding: 9px 16px; font-size: 14px; font-weight: 700;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18); pointer-events: none;
    }
    /* 控制列 */
    .controls {
      position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.92);
      backdrop-filter: blur(6px); padding: 10px 16px; border-radius: 16px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }
    .play-btn {
      width: 54px; height: 54px; border-radius: 50%; border: none; cursor: pointer;
      background: #2ecc71; color: #fff; font-size: 22px; box-shadow: 0 4px 12px rgba(46,204,113,0.4);
    }
    .play-btn.playing { background: #f1c40f; box-shadow: 0 4px 12px rgba(241,196,15,0.4); }
    .ctrl-sub { font-size: 13px; color: #7f8c8d; min-width: 64px; }
    .clear-btn { border: 1px solid #e6e9f0; background: #fff; color: #7f8c8d; border-radius: 10px;
      padding: 8px 12px; cursor: pointer; font-size: 13px; }
    /* 選取連桿後的長度編輯面板 */
    .len-editor { position: absolute; top: 16px; left: 16px; display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.96); border: 1px solid #e6e9f0; border-radius: 12px; padding: 8px 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
    .len-editor .le-title { font-size: 13px; font-weight: 700; color: #2c5282; }
    .len-editor button { width: 28px; height: 28px; border: 1px solid #d8dee6; background: #fff;
      border-radius: 8px; font-size: 16px; cursor: pointer; line-height: 1; }
    .len-editor input { width: 62px; padding: 5px; border: 1px solid #d8dee6; border-radius: 8px;
      font-size: 14px; text-align: center; }
    .len-editor .le-unit { font-size: 12px; color: #95a5a6; }
    .role-editor { position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.96); border: 1px solid #e6e9f0; border-radius: 12px; padding: 8px 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
    .role-editor .re-title { font-size: 13px; font-weight: 700; color: #8e3b32; }
    .role-editor .re-status { font-size: 12px; color: #7f8c8d; min-width: 58px; }
    .role-editor button { border: 1px solid #d8dee6; background: #fff; border-radius: 8px; padding: 6px 9px;
      font-size: 12px; cursor: pointer; }
    .role-editor button:hover { background: #f6f8fb; }
    /* 3D 預覽覆蓋層 */
    #view3d { position: absolute; inset: 0; display: none; background: #0f1420; }
    #view3d canvas { display: block; width: 100%; height: 100%; }
    .view3d-hint { position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(15,20,32,0.75); color: #cdd6e6; border-radius: 999px; padding: 7px 14px;
      font-size: 13px; pointer-events: none; }
    #btn3d.active { background: #2c3e50; color: #fff; border-color: #2c3e50; }
  </style>
  <script type="importmap">
    { "imports": { "three": "./js/vendor/three.module.js" } }
  </script>
</head>
<body>
  <header>
    <h1>🧩 機構積木</h1>
    <a class="home-btn" href="mechanism.html">← 回機構工具</a>
  </header>

  <div class="stage">
    <div class="tray">
      <div class="tray-title">零件盤</div>
      <div class="block anchor" onclick="window.blocks.addAnchor()">
        <span class="ico">📌</span>
        <span class="name">地錨</span>
        <span class="role">釘在地上</span>
      </div>
      <div class="block link" onclick="window.blocks.addLink()">
        <span class="ico">🔵</span>
        <span class="name">連桿</span>
        <span class="role">桿子，有長度</span>
      </div>
      <div class="block motor" onclick="window.blocks.placeMotor()">
        <span class="ico">🔴</span>
        <span class="name">馬達</span>
        <span class="role">放到接點上</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <svg id="stageSvg" viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="hint" id="hint">放一根🔵連桿 → 把🔴馬達放到它一端 → 按 ▶ 看它動</div>
      <div class="mode-banner" id="modeBanner" style="display:none;"></div>
      <div class="mode-banner" id="solveBanner" style="display:none; top:58px;"></div>
      <div class="len-editor" id="lenEditor" style="display:none;">
        <span class="le-title">🔵 連桿長度</span>
        <button onclick="window.blocks.changeLen(-10)">−</button>
        <input type="number" id="lenInput" min="10" step="5" onchange="window.blocks.setLen(this.value)" />
        <span class="le-unit">mm</span>
        <button onclick="window.blocks.changeLen(10)">＋</button>
      </div>
      <div class="role-editor" id="roleEditor" style="display:none;">
        <span class="re-title">接點角色</span>
        <span class="re-status" id="roleStatus">自由</span>
        <button onclick="window.blocks.setNodeRole('floating')">變自由</button>
        <button onclick="window.blocks.setNodeRole('fixed')">設地錨</button>
        <button onclick="window.blocks.removeNodeMotor()">拿掉馬達</button>
      </div>
      <div id="view3d">
        <div class="view3d-hint">🧊 3D 預覽：拖曳旋轉、滾輪縮放。編輯請關掉 3D 回到平面。</div>
      </div>
      <div class="controls">
        <button class="play-btn" id="playBtn" onclick="window.blocks.togglePlay()">▶</button>
        <div class="ctrl-sub">角度 <span id="thetaVal">0</span>°</div>
        <button class="clear-btn" id="btn3d" onclick="window.blocks.toggle3D()">🧊 3D</button>
        <button class="clear-btn" onclick="window.blocks.clearAll()">🗑 清空</button>
      </div>
    </div>
  </div>

  <script type="module">
    // 重用既有引擎：角色→步驟編譯 + 求解。求解器一行都不改。
    import { compileTopology } from './js/core/topology.js';
    import { solveTopology } from './js/multilink/solver.js';
    // 3D 唯讀預覽（懶載入 THREE，平面路徑完全不受影響）
    import { buildSceneModel } from './js/blocks3d/scene-model.js';

    const SVG_NS = 'http://www.w3.org/2000/svg';
    const svg = document.getElementById('stageSvg');
    const W = 900, H = 560;
    const SCALE = 1.4;            // 1mm = 1.4px（固定，避免播放時畫面跳動）
    const OX = W / 2, OY = H / 2; // 世界原點對到畫布中心
    const TX = x => OX + x * SCALE;
    const TY = y => OY - y * SCALE; // y 向上為正

    // ---- 狀態 ----
    let comps = [];                       // wizard 風格的組件（角色就藏在 type 裡）
    let topo = { params: { theta: 0 }, tracePoint: '' };
    let compiled = null;
    let theta = 0, raf = null, counter = 0;
    let dragId = null, dragLinkId = null, dragLastWorld = null, snapTarget = null, selectedLinkId = null, selectedNodeId = null;
    let placingMotor = false, pickBars = null;
    let lastSolved = {};           // 上一幀求解成功的點位：給求解器挑「連續」分支 + 死點暫態回退
    let prevSolved = {};           // 再上一幀：和 lastSolved 一起外插出「帶動量」的預測種子
    const SNAP_WORLD = 18 / SCALE; // 吸附門檻（世界座標 mm）
    const LINK_DEFAULT_LEN = 90;   // 連桿預設長度

    // ---- 3D 唯讀預覽狀態 ----
    let viewer3D = null;           // createViewer() 的實體（首次開啟才懶載入）
    let view3DActive = false;      // 3D 覆蓋層是否開著
    let lastModelInputs = null;    // 最近一次 draw() 算好的 { links, pts, groundIds }，給 3D 鏡像用

    const HULL_R_WORLD = 9;        // 冰棒棍外形半徑（世界 mm）：桿件不再是線段，而是有寬度的扁棍

    // 把一根桿（兩端點 a、b）算成「冰棒棍」外形：兩端圓 + 外切線 + 半圓封口。
    // 切線/封弧的幾何沿用 mechanism 零件外形（js/parts/renderer.js 的 computeTangentHullPathQuiet），
    // 確保半圓封口方向正確。座標用 TX/TY 轉到畫面，弧半徑乘 SCALE。
    function barHullPath(a, b) {
      const r = HULL_R_WORLD;
      const getTangent = (p, q) => {
        const dx = q.x - p.x, dy = q.y - p.y;
        const dist = Math.hypot(dx, dy);
        if (dist === 0) return null;
        const nx = dy / dist, ny = -dx / dist; // 右側法線（CCW 走訪的外側）
        return {
          start: { x: p.x + nx * r, y: p.y + ny * r },
          end: { x: q.x + nx * r, y: q.y + ny * r }
        };
      };
      const t1 = getTangent(a, b), t2 = getTangent(b, a);
      if (!t1 || !t2) return '';
      const R = r * SCALE;
      let d = `M ${TX(t1.start.x)} ${TY(t1.start.y)} `;
      d += `L ${TX(t1.end.x)} ${TY(t1.end.y)} `;
      d += `A ${R} ${R} 0 1 0 ${TX(t2.start.x)} ${TY(t2.start.y)} `;
      d += `L ${TX(t2.end.x)} ${TY(t2.end.y)} `;
      d += `A ${R} ${R} 0 1 0 ${TX(t1.start.x)} ${TY(t1.start.y)} Z`;
      return d;
    }

    // 用「上一點 + 速度」外插出預測位置當求解種子：靠動量挑連續分支，
    // 平行四邊形過共線點時才不會翻成交叉四邊形（單純取最近解會挑錯邊）。
    function extrapolateSeed(last, prev) {
      const seed = {};
      for (const id in last) {
        const a = last[id], b = prev[id];
        seed[id] = (b && Number.isFinite(b.x)) ? { x: 2 * a.x - b.x, y: 2 * a.y - b.y } : a;
      }
      return seed;
    }

    function rebuild() {
      compiled = compileTopology(comps, topo, new Set());
      topo.params = compiled.params; // 沿用補齊後的參數
      lastSolved = {};               // 拓撲變了：丟掉舊解，避免拿到不相干的種子
      prevSolved = {};
      document.getElementById('hint').style.display = comps.length ? 'none' : 'block';
      updateRoleEditor();
    }

    function draw() {
      while (svg.firstChild) svg.removeChild(svg.firstChild);
      drawGround();
      if (!compiled || !comps.length) {
        updateSolveBanner(null, 0);
        return;
      }

      let sol = null;
      // 帶「外插（上一幀＋速度）」的預測當種子：靠動量挑連續分支，平行四邊形不會翻成交叉。
      const seed = extrapolateSeed(lastSolved, prevSolved);
      try { sol = solveTopology(compiled, { thetaDeg: theta, _prevPoints: seed }); } catch (_) {}
      const solved = (sol && sol.points) ? sol.points : {};
      // 位移歷史往前推一格：這幀沒解出來的點沿用上一幀的舊值（桿件就不會憑空消失）
      const newLast = { ...lastSolved };
      Object.keys(solved).forEach(id => {
        if (Number.isFinite(solved[id].x) && Number.isFinite(solved[id].y)) newLast[id] = solved[id];
      });
      prevSolved = lastSolved;
      lastSolved = newLast;
      // 合併位置：先用元件座標打底（未被解出的靜態點才畫得出來、拖得動），再用 lastSolved 覆蓋。
      const pts = pointCoords();
      Object.keys(lastSolved).forEach(id => { if (Number.isFinite(lastSolved[id].x)) pts[id] = lastSolved[id]; });

      const groundIds = new Set((compiled.steps || []).filter(s => s.type === 'ground').map(s => s.id));
      const motorCenterIds = new Set((compiled.steps || []).filter(s => s.type === 'input_crank').map(s => s.center));

      // 桿件：紅色曲柄最後畫，避免和藍色桿重疊時被蓋住。
      let missingVisibleLinks = 0;
      const linksToDraw = [...(compiled.visualization.links || [])].sort((a, b) => {
        const ac = a.style === 'crank' ? 1 : 0;
        const bc = b.style === 'crank' ? 1 : 0;
        return ac - bc;
      });
      linksToDraw.forEach(l => {
        const a = pts[l.p1], b = pts[l.p2];
        if (l.hidden) return;
        if (!a || !b || !Number.isFinite(a.x) || !Number.isFinite(b.x)) {
          missingVisibleLinks += 1;
          return;
        }
        const isSel = l.id && l.id === selectedLinkId;
        const editable = l.id && comps.some(c => c.id === l.id && c.type === 'bar' && c.fixedLen);
        const isPickCandidate = pickBars && pickBars.ids.includes(l.id);
        // 冰棒棍外形：填色扁棍取代原本的圓頭線段
        const stroke = isPickCandidate ? '#f39c12' : (isSel ? '#e67e22' : (l.style === 'crank' ? '#e74c3c' : (l.color || '#3498db')));
        const stick = document.createElementNS(SVG_NS, 'path');
        stick.setAttribute('d', barHullPath(a, b));
        stick.setAttribute('fill', stroke + '33');   // 淡色填滿，像一塊積木
        stick.setAttribute('stroke', stroke);
        stick.setAttribute('stroke-width', isSel || isPickCandidate ? 2.5 : 2);
        stick.setAttribute('stroke-linejoin', 'round');
        if (isPickCandidate) stick.setAttribute('stroke-dasharray', '10 7');
        if (editable || isPickCandidate) {
          stick.setAttribute('data-link-id', l.id);
          stick.style.cursor = 'pointer';
          stick.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            if (pickBars) { tryPickBar(l.id); return; }
            if (startFreeLinkDrag(e, l.id)) return;
            selectLink(l.id);
          });
        }
        svg.appendChild(stick);

        // 在兩端冰棒棍頭上鑽孔：與外形同色的細圈，讓它看起來像真的打孔的扁棍。
        // 地錨（方塊）本身就是固定銷，不畫孔。
        const holeR = HULL_R_WORLD * SCALE * 0.72;
        [[a, l.p1], [b, l.p2]].forEach(([pt, pid]) => {
          if (groundIds.has(pid)) return;
          const hole = document.createElementNS(SVG_NS, 'circle');
          hole.setAttribute('cx', TX(pt.x)); hole.setAttribute('cy', TY(pt.y));
          hole.setAttribute('r', holeR);
          hole.setAttribute('fill', 'none');
          hole.setAttribute('stroke', stroke);
          hole.setAttribute('stroke-width', 1.5);
          hole.setAttribute('stroke-opacity', 0.7);
          hole.style.pointerEvents = 'none'; // 不擋下面桿身/上面節點的互動
          svg.appendChild(hole);
        });
      });
      updateSolveBanner(sol, missingVisibleLinks);

      // 吸附高亮：拖曳時靠近的接點亮綠圈
      if (dragId && snapTarget && pts[snapTarget] && Number.isFinite(pts[snapTarget].x)) {
        const t = pts[snapTarget];
        const ring = document.createElementNS(SVG_NS, 'circle');
        ring.setAttribute('cx', TX(t.x)); ring.setAttribute('cy', TY(t.y));
        ring.setAttribute('r', 14); ring.setAttribute('fill', 'none');
        ring.setAttribute('stroke', '#2ecc71'); ring.setAttribute('stroke-width', 3);
        svg.appendChild(ring);
      }

      // 節點（可拖曳；拖近別的接點會吸附合併）
      Object.keys(pts).forEach(id => {
        const p = pts[id];
        if (!Number.isFinite(p.x)) return;
        const isGround = groundIds.has(id);
        const isMotorCenter = motorCenterIds.has(id);
        const node = document.createElementNS(SVG_NS, isGround ? 'rect' : 'circle');
        if (isGround) {
          const size = isMotorCenter ? 18 : 14;
          node.setAttribute('x', TX(p.x) - size / 2); node.setAttribute('y', TY(p.y) - size / 2);
          node.setAttribute('width', size); node.setAttribute('height', size);
          node.setAttribute('rx', 3); node.setAttribute('fill', '#34495e');
          if (isMotorCenter) node.setAttribute('fill', '#e74c3c');
        } else {
          node.setAttribute('cx', TX(p.x)); node.setAttribute('cy', TY(p.y));
          node.setAttribute('r', id === dragId ? 9 : 7); node.setAttribute('fill', '#fff');
          node.setAttribute('stroke', id === dragId ? '#2ecc71' : '#34495e');
          node.setAttribute('stroke-width', 3);
        }
        node.setAttribute('data-id', id);
        node.style.cursor = 'grab';
        node.addEventListener('pointerdown', (e) => onNodeDown(e, id));
        svg.appendChild(node);
      });

      // 把這一幀的姿勢同步給 3D 預覽（開著時才推；平面路徑零負擔）
      lastModelInputs = { links: linksToDraw, pts, groundIds };
      if (view3DActive) push3D();
    }

    // 用最近一幀的求解結果建場景模型，推進 3D viewer
    function push3D() {
      if (!viewer3D || !lastModelInputs) return;
      const { links, pts, groundIds } = lastModelInputs;
      const model = buildSceneModel(links, pts, { groundIds, hullR: HULL_R_WORLD });
      viewer3D.update(model);
    }

    // 切換 3D 唯讀預覽：首次開啟才動態載入 THREE viewer。
    async function toggle3D() {
      view3DActive = !view3DActive;
      const overlay = document.getElementById('view3d');
      const btn = document.getElementById('btn3d');
      btn.classList.toggle('active', view3DActive);
      if (view3DActive) {
        // 開 3D 時收起 2D 的編輯小面板（避免疊在覆蓋層上）
        deselectLink();
        document.getElementById('roleEditor').style.display = 'none';
        overlay.style.display = 'block';
        if (!viewer3D) {
          const { createViewer } = await import('./js/blocks3d/viewer.js');
          viewer3D = createViewer(overlay);
        }
        viewer3D.resize();
        push3D();
      } else {
        overlay.style.display = 'none';
      }
    }

    // 地面基線（機架的視覺暗示）
    function drawGround() {
      const y = TY(0);
      const base = document.createElementNS(SVG_NS, 'line');
      base.setAttribute('x1', 0); base.setAttribute('y1', y);
      base.setAttribute('x2', W); base.setAttribute('y2', y);
      base.setAttribute('stroke', '#cfd6e0'); base.setAttribute('stroke-width', 2);
      svg.appendChild(base);
      for (let x = 20; x < W; x += 26) {
        const h = document.createElementNS(SVG_NS, 'line');
        h.setAttribute('x1', x); h.setAttribute('y1', y);
        h.setAttribute('x2', x - 10); h.setAttribute('y2', y + 10);
        h.setAttribute('stroke', '#dfe4ec'); h.setAttribute('stroke-width', 2);
        svg.appendChild(h);
      }
    }

    // ---- 零件：放下時自動設好「角色」----
    function addAnchor() {
      const n = ++counter;
      cancelMotorMode();
      comps.push({ type: 'anchor', id: 'Anchor' + n, p1: { id: 'A' + n, type: 'fixed', x: -110, y: 0 } });
      rebuild(); draw();
    }

    function clearAll() {
      pause();
      comps = []; theta = 0; counter = 0;
      selectedLinkId = null;
      selectedNodeId = null;
      cancelMotorMode();
      document.getElementById('lenEditor').style.display = 'none';
      document.getElementById('roleEditor').style.display = 'none';
      document.getElementById('solveBanner').style.display = 'none';
      topo = { params: { theta: 0 }, tracePoint: '' };
      document.getElementById('thetaVal').textContent = '0';
      rebuild(); draw();
    }

    const norm360 = deg => ((deg % 360) + 360) % 360;

    // ---- 播放 ----
    const PLAY_STEP = 2;       // 每幀轉幾度
    let playDir = 1;           // 目前轉動方向
    let playPlan = { mode: 'rotate' }; // 'rotate'=整圈轉；{mode:'rock',lo,hi}=在極限間來回擺

    // 從目前姿勢沿著「同一組裝態」往單一方向走，走到「無解」或「接點瞬移過大」為止。
    // 瞬移過大＝求解器被迫跳到另一組鏡像裝態（桿件會看起來塌掉），那就是這個方向的真正極限。
    function walkBranch(dir) {
      const ids = new Set();
      (compiled.visualization.links || []).forEach(l => { if (!l.hidden) { ids.add(l.p1); ids.add(l.p2); } });
      const lens = (compiled.visualization.links || [])
        .filter(l => !l.hidden && l.lenParam).map(l => Math.abs(topo.params[l.lenParam]) || 0);
      const jumpTol = 0.25 * Math.max(60, ...lens); // 單步位移超過此值＝跳裝態＝到極限
      const solveAt = (deg, seed) => {
        let s = null;
        try { s = solveTopology(compiled, { thetaDeg: norm360(deg), _prevPoints: seed }); } catch (_) {}
        return s;
      };
      const maxDisp = (seed, pts) => {
        let m = 0;
        for (const id of ids) {
          const a = seed[id], b = pts && pts[id];
          if (a && b && Number.isFinite(b.x)) { const d = Math.hypot(b.x - a.x, b.y - a.y); if (d > m) m = d; }
        }
        return m;
      };
      const s0 = solveAt(theta, lastSolved);
      let cur = (s0 && s0.points) ? { ...s0.points } : {};
      let before = {};                 // 用來外插的「再前一格」
      let last = theta;
      const steps = Math.round(360 / PLAY_STEP);
      for (let k = 1; k <= steps; k++) {
        const th = theta + dir * PLAY_STEP * k;
        const s = solveAt(th, extrapolateSeed(cur, before)); // 帶動量預測，分支判斷才一致
        if (!s || s.isValid === false || !s.points) return { full: false, limit: last };
        if (maxDisp(cur, s.points) > jumpTol) return { full: false, limit: last };
        before = cur;
        cur = { ...cur, ...s.points };
        last = th;
      }
      return { full: true };           // 繞一整圈都沒斷 = 可整圈轉
    }

    // 開始播放前先規劃這個機構是「整圈轉」還是「來回擺」、以及來回擺的兩端在哪。
    function planMotion() {
      const fwd = walkBranch(1);
      const bwd = walkBranch(-1);
      if (fwd.full || bwd.full || (fwd.limit - bwd.limit) >= 360 - PLAY_STEP) {
        return { mode: 'rotate' };
      }
      return { mode: 'rock', lo: bwd.limit, hi: fwd.limit };
    }

    function play() {
      if (raf) return;
      document.getElementById('playBtn').classList.add('playing');
      document.getElementById('playBtn').textContent = '⏸';
      playPlan = planMotion();
      if (playPlan.mode === 'rock' && playDir > 0 && theta >= playPlan.hi) playDir = -1;
      if (playPlan.mode === 'rock' && playDir < 0 && theta <= playPlan.lo) playDir = 1;
      const step = () => {
        if (playPlan.mode === 'rock') {
          // 搖桿：在 lo..hi 間來回擺，到極限就反向（真實的搖桿物理）
          let next = theta + PLAY_STEP * playDir;
          if (next > playPlan.hi) { playDir = -1; next = theta + PLAY_STEP * playDir; }
          else if (next < playPlan.lo) { playDir = 1; next = theta + PLAY_STEP * playDir; }
          theta = next;
        } else {
          // 曲柄／平行四邊形：順向整圈轉
          theta = theta + PLAY_STEP * playDir;
        }
        document.getElementById('thetaVal').textContent = Math.round(norm360(theta));
        draw();
        raf = requestAnimationFrame(step);
      };
      raf = requestAnimationFrame(step);
    }
    function pause() {
      if (raf) cancelAnimationFrame(raf);
      raf = null;
      document.getElementById('playBtn').classList.remove('playing');
      document.getElementById('playBtn').textContent = '▶';
    }
    function togglePlay() { raf ? pause() : play(); }

    function addLink() {
      const n = ++counter;
      cancelMotorMode();
      const linkCount = comps.filter(c => c.type === 'bar' && !c.isInput).length;
      const y = 45 + linkCount * 35; // 多根時錯開，避免一放就重疊
      const half = LINK_DEFAULT_LEN / 2;
      comps.push({
        type: 'bar', id: 'Link' + n, color: '#3498db',
        p1: { id: 'P' + n + 'a', type: 'floating', x: -half, y },
        p2: { id: 'P' + n + 'b', type: 'floating', x: half, y },
        lenParam: 'LL' + n, isInput: false, fixedLen: true // 連桿是固定長度的剛性桿
      });
      topo.params['LL' + n] = LINK_DEFAULT_LEN;
      rebuild(); draw();
      selectLink('Link' + n); // 放下就選取，方便馬上改長度
    }

    // ---- 馬達：放到接點上，挑一根連桿來驅動 ----
    function setBanner(text) {
      const el = document.getElementById('modeBanner');
      el.textContent = text;
      el.style.display = text ? 'block' : 'none';
    }
    function clearBanner() { setBanner(''); }
    function updateSolveBanner(sol, missingVisibleLinks) {
      const el = document.getElementById('solveBanner');
      if (!el) return;
      const show = missingVisibleLinks > 0 || (sol && sol.isValid === false);
      el.textContent = show ? '這個姿勢到死點了：有些桿件重合，求解器暫時不知道要往哪邊翻' : '';
      el.style.display = show ? 'block' : 'none';
    }
    function cancelMotorMode() {
      placingMotor = false;
      pickBars = null;
      svg.style.cursor = '';
      clearBanner();
    }
    function placeMotor() {
      pause();
      deselectLink();
      placingMotor = true;
      pickBars = null;
      svg.style.cursor = 'crosshair';
      setBanner('點一個接點放上馬達 🔴');
      draw();
    }
    function barsAtNode(nodeId) {
      return comps.filter(c => c.type === 'bar' && c.p1 && c.p2 && (c.p1.id === nodeId || c.p2.id === nodeId));
    }
    function handleMotorOnNode(nodeId) {
      const bars = barsAtNode(nodeId);
      if (!bars.length) {
        setBanner('馬達要放在連桿的端點上喔');
        return;
      }
      if (bars.length === 1) {
        driveBarAt(bars[0].id, nodeId);
        return;
      }
      placingMotor = false;
      pickBars = { nodeId, ids: bars.map(b => b.id) };
      svg.style.cursor = '';
      setBanner('這個接點有好幾根桿，點一下你要馬達轉的那根');
      draw();
    }
    function tryPickBar(barId) {
      if (!pickBars) return;
      if (pickBars.ids.includes(barId)) driveBarAt(barId, pickBars.nodeId);
      else cancelMotorMode();
    }
    function driveBarAt(barId, nodeId) {
      const bar = comps.find(c => c.id === barId && c.type === 'bar');
      if (!bar) return;
      const key = bar.p1.id === nodeId ? 'p1' : (bar.p2.id === nodeId ? 'p2' : null);
      if (!key) return;
      const otherKey = key === 'p1' ? 'p2' : 'p1';
      if (pointIsGround(bar[otherKey].id)) {
        placingMotor = false;
        pickBars = null;
        svg.style.cursor = '';
        setBanner('這根連桿另一端已經釘住了，兩端都固定不會動');
        draw();
        return;
      }
      freezePointAtDisplay(nodeId);
      // 讓馬達「從現在這個姿勢」開始轉：把曲柄目前的角度記成相位偏移。
      // 否則 input 會把曲柄瞬間轉到絕對角度 0，曲柄端點被甩到別處、整個四連桿當場塌掉。
      const angDeg = Math.atan2(bar.p2.y - bar.p1.y, bar.p2.x - bar.p1.x) * 180 / Math.PI;
      bar.phaseOffset = angDeg - theta;
      bar[key].type = 'fixed';
      bar[key].physicalMotor = '1';
      bar.isInput = true;
      bar.physicalMotor = '1';
      cancelMotorMode();
      rebuild(); draw();
    }

    // ---- 拖曳接點 + 靠近吸附合併（這就是「連接」）----
    function worldFromEvent(e) {
      const ctm = svg.getScreenCTM();
      if (!ctm) return null;
      const p = new DOMPoint(e.clientX, e.clientY).matrixTransform(ctm.inverse());
      return { x: (p.x - OX) / SCALE, y: (OY - p.y) / SCALE };
    }
    function pointCoords() {
      const m = {};
      comps.forEach(c => ['p1', 'p2', 'p3'].forEach(k => {
        if (c[k] && c[k].id) m[c[k].id] = { x: Number(c[k].x) || 0, y: Number(c[k].y) || 0 };
      }));
      return m;
    }
    function displayPoint(id) {
      const pts = pointCoords();
      if (compiled) {
        try {
          const sol = solveTopology(compiled, { thetaDeg: theta });
          const p = sol && sol.points && sol.points[id];
          if (p && Number.isFinite(p.x) && Number.isFinite(p.y)) return { x: p.x, y: p.y };
        } catch (_) {}
      }
      return pts[id] || null;
    }
    function updatePointCoordsById(id, x, y) {
      comps.forEach(c => ['p1', 'p2', 'p3'].forEach(k => {
        if (c[k] && c[k].id === id) { c[k].x = x; c[k].y = y; }
      }));
    }
    function freezePointAtDisplay(id) {
      const p = displayPoint(id);
      if (p) updatePointCoordsById(id, p.x, p.y);
    }
    function movePointById(id, dx, dy) {
      comps.forEach(c => ['p1', 'p2', 'p3'].forEach(k => {
        if (c[k] && c[k].id === id) {
          c[k].x = (Number(c[k].x) || 0) + dx;
          c[k].y = (Number(c[k].y) || 0) + dy;
        }
      }));
    }
    function pointRefs(id) {
      const refs = [];
      comps.forEach(c => ['p1', 'p2', 'p3'].forEach(k => {
        if (c[k] && c[k].id === id) refs.push({ comp: c, key: k, point: c[k] });
      }));
      return refs;
    }
    function hasPoint(id) { return pointRefs(id).length > 0; }
    function pointHasMotor(id) {
      return comps.some(c => c.type === 'bar' && c.isInput && (
        (c.p1 && c.p1.id === id && c.p1.physicalMotor) ||
        (c.p2 && c.p2.id === id && c.p2.physicalMotor)
      ));
    }
    function pointIsGround(id) {
      return pointRefs(id).some(ref => isGroundPoint(ref.point));
    }
    function removeMotorAtPoint(id) {
      comps.forEach(c => {
        if (c.type !== 'bar' || !c.isInput || !c.p1 || !c.p2) return;
        const isMotorEnd = (c.p1.id === id && c.p1.physicalMotor) || (c.p2.id === id && c.p2.physicalMotor);
        if (!isMotorEnd) return;
        c.isInput = false;
        delete c.physicalMotor;
        delete c.physical_motor;
      });
      pointRefs(id).forEach(ref => {
        delete ref.point.physicalMotor;
        delete ref.point.physical_motor;
      });
    }
    function removeAnchorsAtPoint(id) {
      comps = comps.filter(c => !(c.type === 'anchor' && c.p1 && c.p1.id === id));
    }
    function setPointType(id, type) {
      pointRefs(id).forEach(ref => {
        ref.point.type = type;
        if (type !== 'fixed') {
          delete ref.point.physicalMotor;
          delete ref.point.physical_motor;
        }
      });
    }
    function roleLabel(id) {
      if (pointHasMotor(id)) return '馬達';
      if (pointIsGround(id)) return '地錨';
      return '自由';
    }
    function updateRoleEditor() {
      const editor = document.getElementById('roleEditor');
      if (!editor) return;
      if (!selectedNodeId || !hasPoint(selectedNodeId)) {
        editor.style.display = 'none';
        return;
      }
      document.getElementById('roleStatus').textContent = roleLabel(selectedNodeId);
      editor.style.display = 'flex';
    }
    function setNodeRole(type) {
      if (!selectedNodeId || !hasPoint(selectedNodeId)) return;
      pause();
      if (type === 'floating') removeMotorAtPoint(selectedNodeId);
      if (type === 'fixed') removeMotorAtPoint(selectedNodeId);
      if (type === 'fixed') freezePointAtDisplay(selectedNodeId);
      setPointType(selectedNodeId, type);
      if (type === 'floating') removeAnchorsAtPoint(selectedNodeId);
      rebuild(); draw();
    }
    function removeNodeMotor() {
      if (!selectedNodeId || !hasPoint(selectedNodeId)) return;
      pause();
      removeMotorAtPoint(selectedNodeId);
      rebuild(); draw();
    }
    function findNearest(id) {
      const m = pointCoords();
      const d = m[id]; if (!d) return null;
      let best = null, bestDist = SNAP_WORLD;
      Object.keys(m).forEach(id2 => {
        if (id2 === id) return;
        const dist = Math.hypot(m[id2].x - d.x, m[id2].y - d.y);
        if (dist < bestDist) { bestDist = dist; best = id2; }
      });
      return best;
    }
    function mergePoints(fromId, toId) {
      const t = pointCoords()[toId]; if (!t) return;
      comps.forEach(c => ['p1', 'p2', 'p3'].forEach(k => {
        if (c[k] && c[k].id === fromId) { c[k].id = toId; c[k].x = t.x; c[k].y = t.y; }
      }));
      // 被合併成零長度的桿就移除
      comps = comps.filter(c => !(c.type === 'bar' && c.p1 && c.p2 && c.p1.id === c.p2.id));
    }
    function recomputeLengths() {
      // 固定長度的連桿不跟著拉伸；其餘桿（如曲柄）長度跟著畫面更新
      comps.forEach(c => {
        if (c.type === 'bar' && !c.fixedLen && c.lenParam && c.p1 && c.p2) {
          topo.params[c.lenParam] = Math.round(
            Math.hypot((c.p2.x || 0) - (c.p1.x || 0), (c.p2.y || 0) - (c.p1.y || 0)));
        }
      });
    }

    // 找出「以此點為端點、且只屬於一根」的固定長度連桿（用來做圓規式拖曳）
    function fixedLinkFor(id) {
      const ls = comps.filter(c => c.type === 'bar' && c.fixedLen && (c.p1.id === id || c.p2.id === id));
      return ls.length === 1 ? ls[0] : null;
    }
    function pointUseCount(id) {
      let count = 0;
      comps.forEach(c => ['p1', 'p2', 'p3'].forEach(k => {
        if (c[k] && c[k].id === id) count += 1;
      }));
      return count;
    }
    function isGroundPoint(p) {
      return p && (p.type === 'fixed' || p.type === 'motor' || p.type === 'linear');
    }
    function isFreeLink(c) {
      return c && c.type === 'bar' && c.fixedLen &&
        c.p1 && c.p2 &&
        !isGroundPoint(c.p1) && !isGroundPoint(c.p2) &&
        pointUseCount(c.p1.id) === 1 && pointUseCount(c.p2.id) === 1;
    }
    function freeLinkForPoint(id) {
      const c = fixedLinkFor(id);
      return isFreeLink(c) ? c : null;
    }
    function startFreeLinkDrag(e, linkId) {
      const c = comps.find(x => x.id === linkId && isFreeLink(x));
      if (!c) return false;
      const w = worldFromEvent(e);
      if (!w) return false;
      pause();
      selectLink(linkId);
      dragLinkId = linkId;
      dragLastWorld = w;
      snapTarget = null;
      try { svg.setPointerCapture(e.pointerId); } catch (_) {}
      draw();
      return true;
    }
    function onNodeDown(e, id) {
      e.preventDefault();
      if (placingMotor) { e.stopPropagation(); handleMotorOnNode(id); return; }
      if (pickBars) return;
      pause();
      selectedNodeId = id;
      updateRoleEditor();
      dragId = id; snapTarget = null;
      try { svg.setPointerCapture(e.pointerId); } catch (_) {}
      draw();
    }
    function onDragMove(e) {
      const w = worldFromEvent(e); if (!w) return;
      if (dragLinkId && dragLastWorld) {
        const c = comps.find(x => x.id === dragLinkId && isFreeLink(x));
        if (!c) return;
        const dx = w.x - dragLastWorld.x;
        const dy = w.y - dragLastWorld.y;
        movePointById(c.p1.id, dx, dy);
        movePointById(c.p2.id, dx, dy);
        dragLastWorld = w;
        rebuild(); draw();
        return;
      }
      if (!dragId) return;
      let tx = w.x, ty = w.y;
      // 自由連桿：兩端都未固定、也沒接到別的桿時，拖端點等於整根平移。
      const free = freeLinkForPoint(dragId);
      if (free) {
        const p = pointCoords()[dragId];
        const dx = w.x - (p?.x || 0);
        const dy = w.y - (p?.y || 0);
        movePointById(free.p1.id, dx, dy);
        movePointById(free.p2.id, dx, dy);
        snapTarget = findNearest(dragId);
        rebuild(); draw();
        return;
      }
      // 固定長度連桿：已有約束時，拖端點繞另一端以固定半徑旋轉（圓規），長度不變
      const fl = fixedLinkFor(dragId);
      if (fl) {
        const other = fl.p1.id === dragId ? fl.p2 : fl.p1;
        const L = Math.max(1, topo.params[fl.lenParam] ||
          Math.hypot((fl.p2.x || 0) - (fl.p1.x || 0), (fl.p2.y || 0) - (fl.p1.y || 0)));
        let dx = w.x - (other.x || 0), dy = w.y - (other.y || 0);
        const d = Math.hypot(dx, dy) || 1;
        tx = (other.x || 0) + dx / d * L;
        ty = (other.y || 0) + dy / d * L;
      }
      updatePointCoordsById(dragId, tx, ty);
      recomputeLengths();
      snapTarget = findNearest(dragId);
      rebuild(); draw();
    }
    function onDragEnd() {
      if (dragLinkId) {
        dragLinkId = null; dragLastWorld = null;
        rebuild(); draw();
        return;
      }
      if (!dragId) return;
      const did = dragId, tgt = snapTarget;
      dragId = null; snapTarget = null;
      if (tgt) mergePoints(did, tgt);
      if (tgt && selectedNodeId === did) selectedNodeId = tgt;
      recomputeLengths();
      rebuild(); draw();
    }
    // ---- 選取連桿 + 改長度 ----
    function selectLink(id) {
      cancelMotorMode();
      const c = comps.find(x => x.id === id && x.type === 'bar' && x.fixedLen);
      if (!c) return;
      selectedLinkId = id;
      document.getElementById('lenEditor').style.display = 'flex';
      document.getElementById('lenInput').value = Math.round(topo.params[c.lenParam] || 0);
      draw();
    }
    function deselectLink() {
      if (!selectedLinkId) return;
      selectedLinkId = null;
      document.getElementById('lenEditor').style.display = 'none';
      draw();
    }
    function setLen(v) {
      const c = comps.find(x => x.id === selectedLinkId);
      if (!c) return;
      const L = Math.max(10, Math.round(Number(v) || 0));
      topo.params[c.lenParam] = L;
      // 把 b 端重新擺到半徑 L（自由連桿才看得到；已連接的由 solver 接手）
      const dx = (c.p2.x || 0) - (c.p1.x || 0), dy = (c.p2.y || 0) - (c.p1.y || 0);
      const d = Math.hypot(dx, dy) || 1;
      c.p2.x = (c.p1.x || 0) + dx / d * L;
      c.p2.y = (c.p1.y || 0) + dy / d * L;
      document.getElementById('lenInput').value = L;
      rebuild(); draw();
    }
    function changeLen(delta) {
      const c = comps.find(x => x.id === selectedLinkId);
      if (c) setLen((topo.params[c.lenParam] || 0) + delta);
    }

    svg.addEventListener('pointermove', onDragMove);
    svg.addEventListener('pointerup', onDragEnd);
    svg.addEventListener('pointercancel', onDragEnd);
    // 點空白處（背景/地面線，未 stopPropagation）取消選取
    svg.addEventListener('pointerdown', () => {
      if (placingMotor || pickBars) { cancelMotorMode(); draw(); return; }
      if (dragId || dragLinkId) return;
      selectedNodeId = null;
      updateRoleEditor();
      if (!dragId) deselectLink();
    });

    window.addEventListener('resize', () => { if (viewer3D && view3DActive) viewer3D.resize(); });

    window.blocks = { placeMotor, addAnchor, addLink, clearAll, togglePlay, setLen, changeLen, selectLink, setNodeRole, removeNodeMotor, toggle3D };
    rebuild(); draw();
  </script>
</body>
</html>
