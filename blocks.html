<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>🧩 機構積木</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; color: #2c3e50;
      display: flex; flex-direction: column; height: 100vh;
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); z-index: 5;
    }
    header h1 { margin: 0; font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .home-btn { text-decoration: none; color: #34495e; background: #eef2f7; padding: 8px 14px;
      border-radius: 20px; font-size: 14px; font-weight: 600; }
    .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .tool-btn { border: 1px solid #e6e9f0; background: #fff; color: #34495e; border-radius: 10px;
      padding: 8px 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .example-select { border: 1px solid #e6e9f0; background: #fff; color: #34495e; border-radius: 10px;
      padding: 8px 10px; font-size: 14px; font-weight: 600; max-width: 180px; }
    .tool-btn:hover { background: #f6f8fb; }
    .tool-btn:disabled { opacity: .45; cursor: default; }
    .stage { flex: 1; display: flex; min-height: 0; }

    /* 零件盤 */
    .tray { width: 150px; background: #fff; border-right: 1px solid #eee; padding: 14px 10px;
      display: flex; flex-direction: column; gap: 12px; }
    .tray-title { font-size: 12px; color: #95a5a6; font-weight: 700; letter-spacing: 0.05em; }
    .block {
      border: 2px solid #e6e9f0; border-radius: 14px; padding: 12px 8px; cursor: pointer;
      background: #fff; text-align: center; transition: transform .08s, box-shadow .12s;
      display: flex; flex-direction: column; align-items: center; gap: 6px; user-select: none;
    }
    .block:hover { transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,0.08); }
    .block:active { transform: translateY(0); }
    .block .ico { font-size: 30px; line-height: 1; }
    .block .name { font-size: 13px; font-weight: 700; }
    .block .role { font-size: 10px; color: #95a5a6; }
    .block.motor { border-color: #f7c5c0; }
    .block.anchor { border-color: #d8dee6; }
    .block.link { border-color: #bcd3f0; }
    .block.triangle { border-color: #c7ead2; }

    /* 畫布 */
    .canvas-wrap { flex: 1; position: relative; min-width: 0; }
    #stageSvg { width: 100%; height: 100%; display: block; background:
      linear-gradient(#f6f8fb 0 0); touch-action: none; }
    .hint {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #b0bac6; font-size: 16px; text-align: center; pointer-events: none; line-height: 1.7;
    }
    .mobile-hint { display: none; }
    .mode-banner {
      position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(44,62,80,0.94); color: #fff; border-radius: 999px;
      padding: 9px 16px; font-size: 14px; font-weight: 700;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18); pointer-events: none;
    }
    /* 控制列 */
    .controls {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px); padding: 6px; border: 1px solid rgba(216,222,230,0.8); border-radius: 999px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
    }
    .play-btn {
      width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
      background: #2ecc71; color: #fff; font-size: 17px; line-height: 1;
      box-shadow: 0 3px 10px rgba(46,204,113,0.32);
    }
    .play-btn.playing { background: #f1c40f; box-shadow: 0 3px 10px rgba(241,196,15,0.32); }
    .ctrl-sub {
      min-width: 42px; padding: 0 8px; font-size: 12px; font-weight: 700; color: #60717d;
      text-align: center; white-space: nowrap;
    }
    .clear-btn { border: 1px solid #e6e9f0; background: #fff; color: #7f8c8d; border-radius: 10px;
      padding: 8px 12px; cursor: pointer; font-size: 13px; }
    .controls .clear-btn {
      width: 34px; height: 34px; border-radius: 999px; padding: 0; line-height: 1;
    }
    .danger-btn { border-color: #ffc9c9; background: #fff5f5; color: #c0392b; font-weight: 700; }
    /* 選取連桿後的長度編輯面板 */
    .len-editor { position: absolute; top: 16px; left: 16px; display: flex; flex-direction: column;
      align-items: stretch; gap: 8px; max-width: 288px;
      background: rgba(255,255,255,0.96); border: 1px solid #e6e9f0; border-radius: 12px; padding: 8px 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
    .len-editor .le-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .len-editor .le-title { font-size: 13px; font-weight: 700; color: #2c5282; }
    .len-editor .le-step { width: 28px; height: 28px; border: 1px solid #d8dee6; background: #fff;
      border-radius: 8px; font-size: 16px; cursor: pointer; line-height: 1; }
    .len-editor .le-value { font-size: 14px; font-weight: 700; color: #2c5282; min-width: 54px; text-align: center; }
    .len-editor .le-unit { font-size: 12px; color: #95a5a6; margin-left: 2px; }
    .len-editor .tri-side { border: 1px solid #d8dee6; border-radius: 8px; padding: 4px 6px;
      font-size: 12px; font-weight: 700; color: #2c5282; background: #fff; }
    .len-editor .lift-btn { border: 1px solid #d8dee6; background: #fff; border-radius: 8px;
      font-size: 12px; padding: 6px 9px; cursor: pointer; line-height: 1; white-space: nowrap; }
    .len-editor .lift-btn:hover { background: #f6f8fb; }
    .len-editor .lift-btn.lift-on { background: #eaf2ff; border-color: #7fb0ff; color: #2c5282; font-weight: 700; }
    .role-editor { position: absolute; top: 16px; right: 16px; display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.96); border: 1px solid #e6e9f0; border-radius: 12px; padding: 8px 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1); }
    .role-editor .re-title { font-size: 13px; font-weight: 700; color: #8e3b32; }
    .role-editor .re-status { font-size: 12px; color: #7f8c8d; min-width: 58px; }
    .role-editor button { border: 1px solid #d8dee6; background: #fff; border-radius: 8px; padding: 6px 9px;
      font-size: 12px; cursor: pointer; }
    .role-editor button:hover { background: #f6f8fb; }
    .role-editor .trace-on { background: #e8f8ef; color: #117a45; border-color: #9dddb8; font-weight: 700; }
    /* 3D 預覽覆蓋層 */
    #view3d { position: absolute; inset: 0; display: none; background: #0f1420; }
    #view3d canvas { display: block; width: 100%; height: 100%; }
    .view3d-hint { position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(15,20,32,0.75); color: #cdd6e6; border-radius: 999px; padding: 7px 14px;
      font-size: 13px; pointer-events: none; }
    #btn3d.active { background: #2c3e50; color: #fff; border-color: #2c3e50; }
    @media (hover: none), (pointer: coarse) {
      .desktop-hint { display: none; }
      .mobile-hint { display: inline; }
    }
    /* 手機：零件盤移到底部橫條，畫布吃滿上方 */
    @media (max-width: 640px) {
      header { flex-wrap: wrap; gap: 8px; }
      .tool-btn { padding: 7px 10px; font-size: 13px; }
      .stage { flex-direction: column-reverse; }
      .tray { width: 100%; flex-direction: row; gap: 8px; padding: 8px 10px;
        border-right: none; border-top: 1px solid #eee; overflow-x: auto; }
      .tray-title { display: none; }
      .block { flex: 0 0 auto; min-width: 84px; padding: 8px 6px; }
      .block .ico { font-size: 24px; }
      .controls { bottom: 8px; gap: 5px; padding: 5px; max-width: calc(100% - 16px); }
      .play-btn { width: 36px; height: 36px; font-size: 16px; }
      .controls .clear-btn { width: 32px; height: 32px; font-size: 12px; }
      .ctrl-sub { min-width: 36px; padding: 0 5px; font-size: 11px; }
      .len-editor, .role-editor { top: 10px; padding: 6px 8px; gap: 6px; }
      .len-editor { left: 8px; }
      .role-editor { right: 8px; }
    }
  </style>
  <script type="importmap">
    { "imports": { "three": "./js/vendor/three.module.js" } }
  </script>
</head>
<body>
  <header>
    <h1>🧩 機構積木</h1>
    <div class="toolbar">
      <button class="tool-btn" id="btnUndo" onclick="window.blocks.undo()" disabled title="復原上一步">↩ 復原</button>
      <button class="tool-btn" onclick="window.blocks.saveFile()" title="存成檔案">💾 存檔</button>
      <button class="tool-btn" onclick="window.blocks.openFile()" title="開啟檔案">📂 開啟</button>
      <button class="tool-btn" onclick="window.blocks.share()" title="複製分享連結，貼給別人就能打開">🔗 分享</button>
      <select class="example-select" id="exampleSelect" onchange="window.blocks.loadExample(this.value)" title="載入課堂範例">
        <option value="">📘 範例</option>
      </select>
      <a class="home-btn" href="mechanism.html">← 回機構工具</a>
    </div>
  </header>

  <div class="stage">
    <div class="tray">
      <div class="tray-title">零件盤</div>
      <div class="block anchor" onclick="window.blocks.addAnchor()">
        <span class="ico">📌</span>
        <span class="name">地錨</span>
        <span class="role">釘在地上</span>
      </div>
      <div class="block link" onclick="window.blocks.startDrawLink()">
        <span class="ico">🔵</span>
        <span class="name">連桿</span>
        <span class="role"><span class="desktop-hint">移動滑鼠拉出</span><span class="mobile-hint">拖曳拉出</span></span>
      </div>
      <div class="block triangle" onclick="window.blocks.startDrawTriangle()">
        <span class="ico">🔺</span>
        <span class="name">三點桿</span>
        <span class="role"><span class="desktop-hint">移動調形狀，右鍵確定</span><span class="mobile-hint">拖曳調形狀，放開確定</span></span>
      </div>
      <div class="block motor" onclick="window.blocks.placeMotor()">
        <span class="ico">🔴</span>
        <span class="name">馬達</span>
        <span class="role">放到接點上</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <svg id="stageSvg" viewBox="0 0 900 560" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="hint" id="hint">
        <span class="desktop-hint">先點🔵連桿，移動滑鼠拉長，右鍵確定<br>再把🔴馬達放到端點，按 ▶ 看它動</span>
        <span class="mobile-hint">先點🔵連桿，在畫面拖曳拉長並放開<br>再把🔴馬達放到端點，按 ▶ 看它動</span>
      </div>
      <div class="mode-banner" id="modeBanner" style="display:none;"></div>
      <div class="mode-banner" id="solveBanner" style="display:none; top:58px;"></div>
      <div class="len-editor" id="lenEditor" style="display:none;">
        <div class="le-row">
          <span class="le-title" id="lenTitle">🔵 連桿長度</span>
          <select class="tri-side" id="triSideSelect" style="display:none;" onchange="window.blocks.setTriSide(this.value)" title="選要調整的邊">
            <option value="g">底邊</option>
            <option value="r1">邊1</option>
            <option value="r2">邊2</option>
          </select>
          <span class="le-row" id="lenControls">
            <button class="le-step" onclick="window.blocks.changeLen(-8)" title="短 8mm（少一孔）">−</button>
            <span class="le-value"><span id="lenValue">88</span><span class="le-unit">mm</span></span>
            <button class="le-step" onclick="window.blocks.changeLen(8)" title="長 8mm（多一孔）">＋</button>
          </span>
          <button class="clear-btn danger-btn" onclick="window.blocks.deleteSelectedPart()" title="刪除選取的桿件">🗑 刪除</button>
        </div>
        <div class="le-row">
          <span class="le-title">疊放</span>
          <button class="lift-btn" id="liftUpBtn" onclick="window.blocks.bringPart('up')" title="往上疊一層（一路挪回去就回到自動）">🔼 上移一層</button>
          <button class="lift-btn" id="liftDownBtn" onclick="window.blocks.bringPart('down')" title="往下疊一層（一路挪回去就回到自動）">🔽 下移一層</button>
        </div>
      </div>
      <div class="role-editor" id="roleEditor" style="display:none;">
        <span class="re-title">接點角色</span>
        <span class="re-status" id="roleStatus">自由</span>
        <button onclick="window.blocks.setNodeRole('floating')">變自由</button>
        <button onclick="window.blocks.setNodeRole('fixed')">設地錨</button>
        <button onclick="window.blocks.removeNodeMotor()">拿掉馬達</button>
        <button id="traceBtn" onclick="window.blocks.toggleTracePoint()" title="追蹤這個接點走過的路徑">設軌跡點</button>
      </div>
      <div id="view3d">
        <div class="view3d-hint">
          <span class="desktop-hint">🧊 3D 預覽：拖曳旋轉、滾輪縮放。編輯請關掉 3D 回到平面。</span>
          <span class="mobile-hint">🧊 3D 預覽：單指旋轉、雙指縮放。編輯請關掉 3D 回到平面。</span>
        </div>
      </div>
      <div class="controls">
        <button class="play-btn" id="playBtn" onclick="window.blocks.togglePlay()" title="播放 / 暫停">▶</button>
        <div class="ctrl-sub" title="目前角度"><span id="thetaVal">0</span>°</div>
        <button class="clear-btn" onclick="window.blocks.fitView()" title="置中">⊡</button>
        <button class="clear-btn" id="btn3d" onclick="window.blocks.toggle3D()" title="3D 預覽">3D</button>
        <button class="clear-btn" onclick="window.blocks.clearAll()" title="清空">🗑</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/blocks/app.js?v=20240128_02"></script>
</body>
</html>
